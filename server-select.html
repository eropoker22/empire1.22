<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empire Streets | Server Selection Protocol</title>
    <meta name="description" content="Prémiový cyberpunk výběr serveru Empire Streets.">
    <link rel="stylesheet" href="./server-select.css">
    <link rel="stylesheet" href="./page-assets/css/styles-static-hover.css">
  </head>
  <body>
    <main class="server-select-app" data-app>
      <div class="city-bg" aria-hidden="true">
        <span class="rain-layer"></span>
        <span class="scanline-layer"></span>
        <span class="noise-layer"></span>
        <span class="police-light police-light--blue"></span>
        <span class="police-light police-light--red"></span>
      </div>

      <header class="topbar">
        <nav class="terminal-nav" data-terminal-nav aria-label="Server menu">
          <button class="is-active" type="button" data-nav="city" aria-pressed="true"><span aria-hidden="true">▣</span> VÝBĚR MĚSTA</button>
          <button type="button" data-nav="gang" aria-pressed="false"><span aria-hidden="true">♟</span> MOJE GANG</button>
          <button type="button" data-nav="market" aria-pressed="false"><span aria-hidden="true">▱</span> OBCHOD</button>
          <button type="button" data-nav="settings" aria-pressed="false"><span aria-hidden="true">⚙</span> NASTAVENÍ</button>
        </nav>
        <section class="top-player" data-player-topbar aria-label="Hráč"></section>
      </header>

      <div class="layout-grid">
        <aside class="left-rail" data-sidebar aria-label="Stav města"></aside>

        <section class="command-panel" aria-label="Výběr serveru">
          <div class="command-panel__grid"></div>
          <div class="terminal-heading">
            <span>COMMAND TERMINAL</span>
            <h1>VÝBĚR SERVERU</h1>
            <p>Zvol server pro režim <strong>WAR</strong> nebo <b>FREE</b> a klikni na startovní district.</p>
          </div>

          <section class="player-summary" data-player-summary aria-label="Přihlášený hráč"></section>
          <section class="mode-tabs" data-mode-tabs aria-label="Výběr režimu"></section>
          <section class="server-list" data-server-list aria-live="polite"></section>
        </section>

        <aside class="right-panel" aria-label="District a detail serveru">
          <section class="map-panel">
            <div class="panel-title">
              <div>
                <span>MAP PROTOCOL</span>
                <h2>VYBER STARTOVNÍ DISTRICT</h2>
              </div>
              <small>LIVE MAP</small>
            </div>
            <p>Klikni na district na mapě pro výběr místa.</p>
            <div class="district-map" data-district-map></div>
            <div class="district-legend" data-district-legend></div>
          </section>

          <section class="server-details" data-server-details aria-live="polite"></section>
        </aside>
      </div>

      <section class="nav-module-panel" data-nav-panel hidden aria-live="polite"></section>
      <div class="toast-stack" data-toast-stack aria-live="polite"></div>
      <div class="connect-overlay" data-connect-overlay hidden>
        <div>
          <span data-connect-kicker>CONNECTING</span>
          <strong data-connect-message>PŘIPOJOVÁNÍ K SERVERU…</strong>
        </div>
      </div>
    </main>

    <script type="module" src="./page-assets/js/config.js"></script>
    <script type="module" src="./server-select.js"></script>
  </body>
</html>
