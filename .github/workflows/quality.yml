name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, tests, build, E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build admin page
        run: npm run build:admin:page

      - name: Build hosted worker bundle
        run: npm run build:hosted-worker

      - name: Build immutable worker image
        if: github.event_name == 'push'
        run: docker build --build-arg EMPIRE_BUILD_SHA=${{ github.sha }} --tag empire-hosted-worker:${{ github.sha }} --file Dockerfile.hosted-worker .

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e:smoke
