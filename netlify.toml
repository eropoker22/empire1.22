[build]
  command = "npm run build:admin:page"
  publish = "client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/gameplay-slice/*"
  to = "/.netlify/functions/gameplay-slice/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/login.html"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/lobby.html"
  to = "/pages/lobby.html"
  status = 200

[[redirects]]
  from = "/game.html"
  to = "/pages/game.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/pages/admin.html"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/pages/admin.html"
  status = 200

[[redirects]]
  from = "/faction.html"
  to = "/pages/faction.html"
  status = 200
