[build]
  command = "npm run build:admin:page"
  publish = "client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"

  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[headers]]
  for = "/"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/login.html"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pages/login.html"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/page-assets/css/login.css"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "https://www.empirestreets.cz/*"
  to = "https://empirestreets.cz/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.empirestreets.cz/*"
  to = "https://empirestreets.cz/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/servers"
  to = "/.netlify/functions/gameplay-slice/servers"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/gameplay-slice/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/gameplay-slice/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/account/*"
  to = "/.netlify/functions/gameplay-slice/account/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/lobby/*"
  to = "/.netlify/functions/gameplay-slice/lobby/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/gameplay-slice/*"
  to = "/.netlify/functions/gameplay-slice/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/login.html"
  to = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/lobby.html"
  to = "/pages/lobby.html"
  status = 200

[[redirects]]
  from = "/game.html"
  to = "/pages/game.html"
  status = 200

[[redirects]]
  from = "/faction.html"
  to = "/pages/faction.html"
  status = 200
