<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Empire Streets je vstupní stránka do světa hry. Přivítání hráče a rychlý vstup do loginu."
    >
    <title>Empire Streets</title>
    <link rel="stylesheet" href="../page-assets/css/styles.css">
  </head>
  <body>
    <main id="landing-root" class="site-shell" data-page="landing">
      <section class="page-intro landing-hero">
        <div class="landing-hero__copy">
          <p class="landing-kicker">Welcome to the city</p>
          <h1 class="landing-title">Vítej v Empire Streets.</h1>
          <p class="landing-hero__text">
            Vstup do světa ulic, vlivu a boje o kontrolu nad městem.
          </p>
          <div class="landing-hero__actions">
            <a class="button is-primary" href="./login.html">Vstoupit do hry</a>
            <a class="button" href="./lobby.html">Vybrat režim</a>
          </div>
        </div>

        <aside class="landing-hero__visual" aria-hidden="true">
          <div class="landing-signal-card">
            <span class="landing-signal-card__label">Empire Streets</span>
            <strong class="landing-signal-card__value">Město čeká.</strong>
            <p class="landing-signal-card__text">
              Krátká vstupní stránka bez gameplay logiky, mapy a admin obsahu.
            </p>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
